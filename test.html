<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="rounded-xl border border-slate-300 bg-white shadow-sm dark:border-slate-700 dark:bg-slate-900">

        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3 dark:border-slate-800">
            <h3 class="text-sm font-bold text-slate-700 dark:text-slate-200">Level 1: Page Section</h3>
            <button class="text-slate-400 hover:text-red-500">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="space-y-4 bg-slate-50/80 p-4 shadow-inner dark:bg-black/20">

            <div
                class="group/card relative rounded-lg border border-slate-300 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
                <div class="mb-4 flex items-center justify-between">
                    <span class="text-xs font-semibold uppercase text-slate-500">Nested Element</span>
                    <button
                        class="opacity-0 group-hover/card:opacity-100 transition-opacity text-red-400 hover:text-red-600">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>

                <div class="space-y-3 rounded-md border-l-4 border-blue-500/30 bg-slate-100/50 p-3 dark:bg-black/10">
                    <input type="text"
                        class="w-full rounded border border-slate-300 px-3 py-2 text-sm dark:bg-slate-900 dark:border-slate-700"
                        placeholder="Child property...">

                    <button
                        class="flex w-full items-center justify-center gap-2 rounded border border-dashed border-slate-400 py-2 text-xs font-bold text-slate-500 hover:bg-white dark:hover:bg-slate-800">
                        + ADD SUB-ITEM
                    </button>
                </div>
            </div>

            <button
                class="flex w-full items-center justify-center gap-2 rounded-lg border-2 border-dashed border-slate-300 bg-white/50 py-3 text-sm font-bold text-slate-600 transition-all hover:border-slate-400 hover:bg-white dark:border-slate-700 dark:text-slate-400 dark:hover:bg-slate-800">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                ADD NEW ITEM
            </button>

        </div>
    </div>
</body>

</html>
